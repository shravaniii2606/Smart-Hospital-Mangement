          <section class="hs-main">

                No reports found.

            </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function () {
      const SUPABASE_URL = "https://nfmzosvedtieicnfbmlh.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5mbXpvc3ZlZHRpZWljbmZibWxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzk1MDgsImV4cCI6MjA5MDYxNTUwOH0.UWGk4L8AQu-5NfpknMKizvFmAcyX6QgUmqOGSr1G6Wc";

      function getSupabaseClient() {
        if (typeof supabase === "undefined" || !supabase.createClient) {
          return null;
        }
        return supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }

      const listEl = document.getElementById("reportsList");
      const emptyEl = document.getElementById("reportsEmpty");

      function renderReports(reports) {
        if (!reports || reports.length === 0) {
          listEl.innerHTML = "";
          emptyEl.style.display = "block";
          return;
        }

        emptyEl.style.display = "none";
        listEl.innerHTML = reports.map((report) => {
          const fileIcon = report.file_type?.startsWith('image/') ? 'fa-file-image' : 'fa-file-pdf';
          const viewButton = report.file_url || report.file_data
            ? `<button class="btn-mini btn-primary" type="button" data-view-id="${report.id}">View</button>`
            : '';
          
          return `
            <div class="appt-doc-card">
              <div class="doc-avatar"><i class="fa-solid ${fileIcon}"></i></div>
              <div class="doc-content">
                <div class="appt-head-row">
                  <h3>${report.title || "Medical Report"}</h3>
                  <small>${report.date || report.created_at?.split('T')[0] || "-"}</small>
                </div>
                <p class="appt-location">${report.summary || "No summary available"}</p>
                <div class="appt-detail-grid">
                  <small><strong>Type:</strong> ${report.file_type || "Unknown"}</small>
                  <small><strong>Size:</strong> ${report.file_size ? `${Math.round(report.file_size / 1024)} KB` : "Unknown"}</small>
                </div>
              </div>
              ${viewButton}
            </div>
          `;
        }).join("");
      }

      async function loadReports() {
        const client = getSupabaseClient();
        if (!client) {
          console.error("Supabase client not loaded");
          renderReports([]);
          return;
        }

        const userResult = await client.auth.getUser();
        if (userResult.error || !userResult.data || !userResult.data.user) {
          console.error("User not authenticated", userResult.error);
          renderReports([]);
          return;
        }

        const userId = userResult.data.user.id;
        console.log("Loading reports for user:", userId);
        
        const { data, error } = await client
          .from("reports")
          .select("*")
          .eq("user_id", userId)
          .order("created_at", { ascending: false });

        console.log("Reports query result:", { data, error });

        if (error) {
          console.error("Reports query failed:", error);
          renderReports([]);
          return;
        }

        renderReports(data || []);
      }

      listEl.addEventListener("click", async (event) => {
        const target = event.target.closest("[data-view-id]");
        if (!target) return;
        const reportId = target.getAttribute("data-view-id");
        const client = getSupabaseClient();
        if (!client || !reportId) return;

        // Fetch the specific report to get file data
        const { data, error } = await client
          .from("reports")
          .select("*")
          .eq("id", reportId)
          .single();

        if (error || !data) {
          console.error("Failed to fetch report details:", error);
          return;
        }

        // Handle viewing the report
        if (data.file_url) {
          // If it's a URL, open in new tab
          window.open(data.file_url, '_blank');
        } else if (data.file_data) {
          // If it's base64 data, create a blob and download/view
          try {
            let base64Data = data.file_data;
            
            // Check if it's a data URL (starts with "data:")
            if (base64Data.startsWith('data:')) {
              // Extract the base64 part after the comma
              const commaIndex = base64Data.indexOf(',');
              if (commaIndex !== -1) {
                base64Data = base64Data.substring(commaIndex + 1);
              }
            }
            
            const byteCharacters = atob(base64Data);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
              byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            const blob = new Blob([byteArray], { type: data.file_type || 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            
            if (data.file_type?.startsWith('image/')) {
              // For images, open in new tab
              window.open(url, '_blank');
            } else {
              // For other files, download
              const a = document.createElement('a');
              a.href = url;
              a.download = data.file_name || 'report';
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
            }
            
            // Clean up the object URL after a delay
            setTimeout(() => URL.revokeObjectURL(url), 1000);
          } catch (e) {
            console.error("Failed to process file data:", e);
            alert("Unable to open the file. It may be corrupted or in an unsupported format.");
          }
        }
      });

      loadReports();
    })();
  </script>
</body>
</html>
