                  <p>Your hospital-uploaded reports will appear here.</p>

              <div id="reportsList" class="hs-recent-list" style="margin-top: 12px;"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function () {
      const SUPABASE_URL = "https://nfmzosvedtieicnfbmlh.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5mbXpvc3ZlZHRpZWljbmZibWxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzk1MDgsImV4cCI6MjA5MDYxNTUwOH0.UWGk4L8AQu-5NfpknMKizvFmAcyX6QgUmqOGSr1G6Wc";

      function getSupabaseClient() {
        if (typeof supabase === "undefined" || !supabase.createClient) {
          return null;
        }
        return supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }

      function normalizeEmail(value) {
        return String(value || "").trim().toLowerCase();
      }

      function renderReports(reports) {
        const listEl = document.getElementById("reportsList");
        const emptyEl = document.getElementById("reportsEmpty");

        if (!reports.length) {
          listEl.innerHTML = "";
          emptyEl.style.display = "block";
          return;
        }

        emptyEl.style.display = "none";
        listEl.innerHTML = reports.map(function (report) {
          const icon = report.file_type && report.file_type.indexOf("image/") === 0 ? "fa-file-image" : "fa-file-pdf";
          const action = report.file_data
            ? `<button class="btn-mini btn-primary" type="button" data-view="${report.id}">View</button>`
            : "";

          return `
            <div class="appt-doc-card">
              <div class="doc-avatar"><i class="fa-solid ${icon}"></i></div>
              <div class="doc-content">
                <div class="appt-head-row">
                  <h3>${report.title || "Medical Report"}</h3>
                  <small>${report.date || (report.created_at ? report.created_at.split("T")[0] : "-")}</small>
                </div>
                <p class="appt-location">${report.summary || "No summary available."}</p>
                <div class="appt-detail-grid">
                  <small><strong>Type:</strong> ${report.file_type || "Unknown"}</small>
                  <small><strong>Size:</strong> ${report.file_size ? Math.round(report.file_size / 1024) + " KB" : "Unknown"}</small>
                </div>
              </div>
              ${action}
            </div>
          `;
        }).join("");
      }

      async function loadReports() {
        const client = getSupabaseClient();
        if (!client) {
          renderReports([]);
          return;
        }

        const userResult = await client.auth.getUser();
        if (userResult.error || !userResult.data || !userResult.data.user) {
          renderReports([]);
          return;
        }

        const patientEmail = normalizeEmail(userResult.data.user.email);
        if (!patientEmail) {
          renderReports([]);
          return;
        }

        const result = await client
          .from("reports")
          .select("*")
          .ilike("patient_email", patientEmail)
          .order("created_at", { ascending: false });

        if (result.error) {
          console.error("Failed to load reports:", result.error);
          renderReports([]);
          return;
        }

        renderReports(result.data || []);
      }

      function openReportFile(fileData, fileType) {
        if (!fileData) return;
        var mime = fileType || "application/pdf";
        if (fileData.startsWith("http://") || fileData.startsWith("https://")) {
          window.location.href = fileData;
          return;
        }
        if (fileData.startsWith("data:")) {
          window.location.href = fileData;
          return;
        }

        try {
          var base64 = fileData;
          var byteChars = atob(base64);
          var byteNumbers = new Array(byteChars.length);
          for (var i = 0; i < byteChars.length; i += 1) {
            byteNumbers[i] = byteChars.charCodeAt(i);
          }
          var byteArray = new Uint8Array(byteNumbers);
          var blob = new Blob([byteArray], { type: mime });
          var url = URL.createObjectURL(blob);
          window.location.href = url;
        } catch (_err) {
          return;
        }
      }

      document.getElementById("reportsList").addEventListener("click", async function (event) {
        const button = event.target.closest("[data-view]");
        if (!button) return;

        const reportId = button.getAttribute("data-view");
        const client = getSupabaseClient();
        if (!client || !reportId) return;

        const result = await client
          .from("reports")
          .select("*")
          .eq("id", reportId)
          .maybeSingle();

        if (result.error || !result.data || !result.data.file_data) {
          return;
        }

        openReportFile(result.data.file_data, result.data.file_type);
      });

      loadReports();
    })();
  </script>
</body>
</html>
