<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Doctors - HealthSphere</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="single-wrap">
    <article class="phone hs-home">
      <div class="body">
        <div class="hs-layout">
          <nav class="hs-sidebar" aria-label="Home sections">
            <a class="hs-side-link" href="patient_home.html">
              <span><i class="fa-solid fa-house"></i></span>
              <small>Home</small>
            </a>
            <a class="hs-side-link" href="ai.html">
              <span><i class="fa-solid fa-robot"></i></span>
              <small>AI Chatbot</small>
            </a>
            <a class="hs-side-link active" href="doctors.html">
              <span><i class="fa-solid fa-user-doctor"></i></span>
              <small>Find Doctors</small>
            </a>
            <a class="hs-side-link" href="bed_availability.html">
              <span><i class="fa-solid fa-bed"></i></span>
              <small>Bed Availability</small>
            </a>
            <a class="hs-side-link" href="appointments.html">
              <span><i class="fa-solid fa-calendar-check"></i></span>
              <small>My Appointments</small>
            </a>
            <a class="hs-side-link" href="emergency.html">
              <span><i class="fa-solid fa-truck-medical"></i></span>
              <small>Emergency</small>
            </a>
            <a class="hs-side-link" href="profile.html">
              <span><i class="fa-regular fa-user"></i></span>
              <small>Profile</small>
            </a>
            <a class="hs-side-link" href="reports.html">
              <span><i class="fa-solid fa-file-medical"></i></span>
              <small>Reports</small>
            </a>
          </nav>

          <section class="hs-main">
            <div class="hs-brand-row">
              <div class="hs-brand-logo"><i class="fa-solid fa-heart-pulse"></i></div>
              <div class="hs-brand-name">HealthSphere</div>
            </div>

            <header class="hs-greet-row">
              <div>
                <p class="hs-hello">Section</p>
                <h2 class="hs-name">Find Doctors</h2>
              </div>
            </header>

            <section class="hs-location-card">
              <div class="hs-location-row">
                <div class="hs-location-icon"><i class="fa-solid fa-user-doctor"></i></div>
                <div>
                  <h4>Available Doctors</h4>
                  <p>Browse and select doctors for appointments.</p>
                </div>
              </div>

              <div class="hs-search-input" style="margin-bottom: 20px;">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input id="doctorSearchInput" class="input" type="text" placeholder="Search doctor by name or specialty" />
              </div>

              <div id="doctorGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 20px;"></div>
              
              <div id="noDoctorsMessage" style="text-align: center; padding: 20px; color: #666; display: none;">
                No doctors available or no matches found.
              </div>

              <div id="loadingMessage" style="text-align: center; padding: 20px; color: #666;">
                Loading doctors...
              </div>
            </section>
          </section>
        </div>
      </div>
    </article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
  <script>
    (function () {
      const SUPABASE_URL = "https://nfmzosvedtieicnfbmlh.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5mbXpvc3ZlZHRpZWljbmZibWxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzk1MDgsImV4cCI6MjA5MDYxNTUwOH0.UWGk4L8AQu-5NfpknMKizvFmAcyX6QgUmqOGSr1G6Wc";

      let allDoctors = [];

      function getSupabaseClient() {
        if (typeof supabase === "undefined" || !supabase.createClient) {
          console.error("Supabase library not loaded");
          return null;
        }
        return supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }

      async function loadDoctors() {
        const supabaseClient = getSupabaseClient();
        if (!supabaseClient) {
          console.error("Cannot load doctors: Supabase not available");
          document.getElementById("loadingMessage").textContent = "Error loading doctors";
          return;
        }

        try {
          const { data, error } = await supabaseClient
            .from('doctor_profile')
            .select('*')
            .order('name', { ascending: true });

          if (error) {
            console.error('Error loading doctors:', error);
            document.getElementById("loadingMessage").textContent = "Error loading doctors";
            return;
          }

          allDoctors = data || [];
          renderDoctors(allDoctors);
        } catch (error) {
          console.error('Error:', error);
          document.getElementById("loadingMessage").textContent = "Error loading doctors";
        }
      }

      function renderDoctors(doctors) {
        const doctorGrid = document.getElementById("doctorGrid");
        const loadingMessage = document.getElementById("loadingMessage");
        const noDoctorsMessage = document.getElementById("noDoctorsMessage");

        loadingMessage.style.display = "none";

        if (!doctors || doctors.length === 0) {
          doctorGrid.innerHTML = "";
          noDoctorsMessage.style.display = "block";
          return;
        }

        noDoctorsMessage.style.display = "none";
        doctorGrid.innerHTML = doctors.map((doctor) => `
          <div style="border: 1px solid #e0e0e0; border-radius: 12px; padding: 16px; background: linear-gradient(180deg, #fff, #f6faff); box-shadow: 0 2px 8px rgba(0,0,0,.08);">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
              <div style="width: 48px; height: 48px; border-radius: 12px; background: linear-gradient(135deg, rgba(11,78,162,.12), rgba(23,162,184,.18)); color: #0b4ea2; display: flex; align-items: center; justify-content: center; font-size: 24px;">
                <i class="fa-solid fa-user-doctor"></i>
              </div>
              <div>
                <h3 style="margin: 0; font-size: 18px; color: #17233d;">${doctor.name}</h3>
                <p style="margin: 0; color: #5d6f8f; font-size: 14px; font-weight: 600;">${doctor.specialty}</p>
              </div>
            </div>
            <div style="display: grid; gap: 6px; font-size: 13px; color: #384b72; margin-bottom: 12px;">
              <span><i class="fa-regular fa-clock" style="width: 14px;"></i> ${doctor.experience}</span>
              <span><i class="fa-solid fa-calendar-day" style="width: 14px;"></i> ${doctor.availability}</span>
              <span><i class="fa-solid fa-phone" style="width: 14px;"></i> ${doctor.phone}</span>
              <span><i class="fa-solid fa-envelope" style="width: 14px;"></i> ${doctor.email}</span>
            </div>
            <p style="margin: 0; font-size: 13px; color: #5d6f8f; line-height: 1.5;">${doctor.bio}</p>
          </div>
        `).join("");
      }

      function filterDoctors() {
        const searchValue = document.getElementById("doctorSearchInput").value.toLowerCase();
        
        if (!searchValue) {
          renderDoctors(allDoctors);
          return;
        }

        const filtered = allDoctors.filter((doctor) => {
          return (
            doctor.name.toLowerCase().includes(searchValue) ||
            doctor.specialty.toLowerCase().includes(searchValue) ||
            doctor.email.toLowerCase().includes(searchValue)
          );
        });

        renderDoctors(filtered);
      }

      // Load doctors on page load
      loadDoctors();

      // Add search functionality
      document.getElementById("doctorSearchInput").addEventListener("input", filterDoctors);
    })();
  </script>
</body>
</html>
