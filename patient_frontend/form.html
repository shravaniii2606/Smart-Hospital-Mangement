<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form - HealthSphere</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css" />
  <style>
    .hs-form-grid { margin-top:16px; display:grid; gap:14px; }
    .hs-form-card { display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; padding:16px 18px; border-radius:20px; background:linear-gradient(180deg, #ffffff, #f7fbff); border:1px solid #dce6f2; box-shadow:0 10px 24px rgba(23,35,61,.05); transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease; cursor:pointer; }
    .hs-form-card:hover { transform:translateY(-2px); border-color:#c7d7ef; box-shadow:0 14px 28px rgba(23,35,61,.1); }
    .hs-form-meta h4 { font-size:16px; color:#17233d; margin-bottom:4px; }
    .hs-form-meta p { color:#5d6f8f; font-size:14px; }
    .hs-form-actions { display:flex; align-items:center; gap:10px; }
    .hs-form-fill { border:0; border-radius:14px; padding:10px 14px; font-size:13px; font-weight:700; color:#fff; background:linear-gradient(135deg, #0b4ea2, #17a2b8); cursor:pointer; box-shadow:0 10px 18px rgba(11,78,162,.18); }
    .hs-form-edit { border:0; border-radius:14px; padding:10px 14px; font-size:13px; font-weight:700; color:#0b4ea2; background:#eef4ff; border:1px solid #cfe0f7; cursor:pointer; }
    .hs-form-filled { border-radius:999px; padding:6px 12px; font-size:12px; font-weight:700; color:#1f8c4b; background:#eaf8ef; border:1px solid #cfe8d7; text-transform:uppercase; letter-spacing:.02em; }
  </style>
</head>
<body>
  <main class="single-wrap">
    <article class="phone hs-home">
      <div class="body">
        <div class="hs-layout">
          <nav class="hs-sidebar" aria-label="Home sections">
            <a class="hs-side-link" href="patient_home.html">
              <span><i class="fa-solid fa-house"></i></span>
              <small>Home</small>
            </a>
            <a class="hs-side-link" href="ai.html">
              <span><i class="fa-solid fa-robot"></i></span>
              <small>AI Chatbot</small>
            </a>
            <a class="hs-side-link" href="doctors.html">
              <span><i class="fa-solid fa-user-doctor"></i></span>
              <small>Find Doctors</small>
            </a>
            <a class="hs-side-link" href="bed_availability.html">
              <span><i class="fa-solid fa-bed"></i></span>
              <small>Bed Availability</small>
            </a>
            <a class="hs-side-link" href="appointments.html">
              <span><i class="fa-solid fa-calendar-check"></i></span>
              <small>My Appointments</small>
            </a>
            <a class="hs-side-link" href="emergency.html">
              <span><i class="fa-solid fa-truck-medical"></i></span>
              <small>Emergency</small>
            </a>
            <a class="hs-side-link" href="prescriptions.html">
              <span><i class="fa-solid fa-prescription-bottle-medical"></i></span>
              <small>Prescriptions</small>
            </a>
            <a class="hs-side-link active" href="form.html">
              <span><i class="fa-solid fa-clipboard-list"></i></span>
              <small>Form</small>
            </a>
            <a class="hs-side-link" href="profile.html">
              <span><i class="fa-regular fa-user"></i></span>
              <small>Profile</small>
            </a>
          </nav>

          <section class="hs-main">
            <div class="hs-brand-row">
              <div class="hs-brand-logo"><i class="fa-solid fa-heart-pulse"></i></div>
              <div class="hs-brand-name">HealthSphere</div>
            </div>

            <header class="hs-greet-row">
              <div>
                <p class="hs-hello">Section</p>
                <h2 class="hs-name">Form</h2>
              </div>
            </header>

            <section class="hs-location-card">
              <div class="hs-location-row">
                <div class="hs-location-icon"><i class="fa-solid fa-clipboard-list"></i></div>
                <div>
                  <h4>Assigned Forms</h4>
                  <p>Forms assigned by the hospital will appear here.</p>
                </div>
              </div>
              <div id="assignedForms" class="hs-form-grid"></div>
              <div id="assignedEmpty" class="hs-bed-empty" style="margin-top: 16px;" hidden>No forms have been assigned yet.</div>
            </section>
          </section>
        </div>
      </div>
    </article>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function () {
      const SUPABASE_URL = "https://nfmzosvedtieicnfbmlh.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5mbXpvc3ZlZHRpZWljbmZibWxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzk1MDgsImV4cCI6MjA5MDYxNTUwOH0.UWGk4L8AQu-5NfpknMKizvFmAcyX6QgUmqOGSr1G6Wc";

      function getSupabaseClient() {
        if (typeof supabase === "undefined" || !supabase.createClient) {
          return null;
        }
        return supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }

      const query = new URLSearchParams(window.location.search);
      const listEl = document.getElementById("assignedForms");
      const emptyEl = document.getElementById("assignedEmpty");

      async function resolvePatientId() {
        const fromQuery = query.get("id");
        if (fromQuery) return fromQuery;
        const client = getSupabaseClient();
        if (!client) return "";
        const userResult = await client.auth.getUser();
        if (userResult.error || !userResult.data || !userResult.data.user) {
          return "";
        }
        return userResult.data.user.id || "";
      }

      async function renderAssigned() {
        const client = getSupabaseClient();
        const patientId = await resolvePatientId();
        if (!client || !patientId) {
          listEl.innerHTML = "";
          emptyEl.hidden = false;
          return;
        }

        const { data, error } = await client
          .from("patient_form_assignments")
          .select("form_name")
          .eq("patient_id", patientId);

        if (error) {
          console.error("Failed to load assigned forms:", error);
          listEl.innerHTML = "";
          emptyEl.hidden = false;
          return;
        }

        const list = (data || []).map((row) => row.form_name).filter(Boolean);

        if (!list.length) {
          listEl.innerHTML = "";
          emptyEl.hidden = false;
          return;
        }

        emptyEl.hidden = true;
        let filledSet = new Set();
        try {
          const rawFilled = window.localStorage.getItem("hs_filled_forms_" + patientId);
          const filledList = rawFilled ? JSON.parse(rawFilled) : [];
          if (Array.isArray(filledList)) {
            filledSet = new Set(filledList);
          }
        } catch (_err) {
          filledSet = new Set();
        }

        listEl.innerHTML = list.map((name) => `
          <article class="hs-form-card" data-form-name="${name}">
            <div class="hs-form-meta">
              <h4>${name}</h4>
              <p>Assigned by hospital</p>
            </div>
            <div class="hs-form-actions">
              ${filledSet.has(name)
                ? `<div class="hs-form-filled">Filled</div><button class="hs-form-edit" type="button" data-edit>Edit</button>`
                : `<button class="hs-form-fill" type="button" data-fill>Fill</button>`}
            </div>
          </article>
        `).join("");
      }

      renderAssigned();
      listEl.addEventListener("click", async function (event) {
        const fillBtn = event.target.closest("[data-fill]");
        const editBtn = event.target.closest("[data-edit]");
        const card = event.target.closest(".hs-form-card");
        if (!card) return;
        if (fillBtn) {
          const name = card.getAttribute("data-form-name") || "Form";
          if (name.toLowerCase() === "admission form") {
            const patientId = await resolvePatientId();
            const suffix = patientId ? "?id=" + encodeURIComponent(patientId) : "";
            window.location.href = "admission_form.html" + suffix;
            return;
          }
          if (name.toLowerCase() === "consent form") {
            const patientId = await resolvePatientId();
            const suffix = patientId ? "?id=" + encodeURIComponent(patientId) : "";
            window.location.href = "consent_form.html" + suffix;
            return;
          }
          if (name.toLowerCase() === "medical history form") {
            const patientId = await resolvePatientId();
            const suffix = patientId ? "?id=" + encodeURIComponent(patientId) : "";
            window.location.href = "medical_history_form.html" + suffix;
            return;
          }
          alert("Form fill is not available yet for: " + name);
        } else if (editBtn) {
          const name = card.getAttribute("data-form-name") || "Form";
          if (name.toLowerCase() === "admission form") {
            const patientId = await resolvePatientId();
            const suffix = patientId ? "?id=" + encodeURIComponent(patientId) : "";
            window.location.href = "admission_form.html" + suffix;
            return;
          }
          if (name.toLowerCase() === "consent form") {
            const patientId = await resolvePatientId();
            const suffix = patientId ? "?id=" + encodeURIComponent(patientId) : "";
            window.location.href = "consent_form.html" + suffix;
            return;
          }
          if (name.toLowerCase() === "medical history form") {
            const patientId = await resolvePatientId();
            const suffix = patientId ? "?id=" + encodeURIComponent(patientId) : "";
            window.location.href = "medical_history_form.html" + suffix;
            return;
          }
          alert("Form edit is not available yet for: " + name);
        } else {
          card.classList.toggle("is-open");
        }
      });
    })();
  </script>
</body>
</html>
