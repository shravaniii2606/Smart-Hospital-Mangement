<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medical History Form - HealthSphere</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css" />
  <style>
    .hs-form-wrap { margin-top: 10px; display: grid; gap: 16px; }
    .hs-form-card { background:#fff; border:1px solid #dce6f2; border-radius:20px; padding:18px; box-shadow:0 12px 24px rgba(23,35,61,.06); }
    .hs-form-grid { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:14px; }
    .hs-field { display:grid; gap:8px; }
    .hs-field label { font-size:13px; font-weight:700; color:#51698f; }
    .hs-input, .hs-textarea { border:1px solid #dce6f2; border-radius:14px; padding:12px 14px; font:inherit; color:#17233d; background:#fff; }
    .hs-textarea { min-height: 110px; resize: vertical; }
    .hs-input[readonly] { background:#f6f9fd; color:#7a8ca8; }
    .hs-actions { display:flex; gap:12px; flex-wrap:wrap; }
    .hs-submit { border:0; border-radius:14px; padding:12px 16px; font-size:14px; font-weight:700; color:#fff; background:linear-gradient(135deg, #0b4ea2, #17a2b8); cursor:pointer; box-shadow:0 12px 22px rgba(11,78,162,.18); }
    .hs-note { font-size:13px; color:#5d6f8f; }
    @media (max-width: 760px) { .hs-form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="single-wrap">
    <article class="phone hs-home">
      <div class="body">
        <div class="hs-layout">
          <nav class="hs-sidebar" aria-label="Home sections">
            <a class="hs-side-link" href="patient_home.html">
              <span><i class="fa-solid fa-house"></i></span>
              <small>Home</small>
            </a>
            <a class="hs-side-link" href="ai.html">
              <span><i class="fa-solid fa-robot"></i></span>
              <small>AI Chatbot</small>
            </a>
            <a class="hs-side-link" href="doctors.html">
              <span><i class="fa-solid fa-user-doctor"></i></span>
              <small>Find Doctors</small>
            </a>
            <a class="hs-side-link" href="bed_availability.html">
              <span><i class="fa-solid fa-bed"></i></span>
              <small>Bed Availability</small>
            </a>
            <a class="hs-side-link" href="appointments.html">
              <span><i class="fa-solid fa-calendar-check"></i></span>
              <small>My Appointments</small>
            </a>
            <a class="hs-side-link" href="emergency.html">
              <span><i class="fa-solid fa-truck-medical"></i></span>
              <small>Emergency</small>
            </a>
            <a class="hs-side-link" href="prescriptions.html">
              <span><i class="fa-solid fa-prescription-bottle-medical"></i></span>
              <small>Prescriptions</small>
            </a>
            <a class="hs-side-link active" href="form.html">
              <span><i class="fa-solid fa-clipboard-list"></i></span>
              <small>Form</small>
            </a>
            <a class="hs-side-link" href="profile.html">
              <span><i class="fa-regular fa-user"></i></span>
              <small>Profile</small>
            </a>
          </nav>

          <section class="hs-main">
            <div class="hs-brand-row">
              <div class="hs-brand-logo"><i class="fa-solid fa-heart-pulse"></i></div>
              <div class="hs-brand-name">HealthSphere</div>
            </div>

            <header class="hs-greet-row">
              <div>
                <p class="hs-hello">Form</p>
                <h2 class="hs-name">Medical History Form</h2>
              </div>
            </header>

            <section class="hs-location-card">
              <div class="hs-location-row">
                <div class="hs-location-icon"><i class="fa-solid fa-notes-medical"></i></div>
                <div>
                  <h4>Medical History</h4>
                  <p>Provide your medical background information.</p>
                </div>
              </div>

              <form id="historyForm" class="hs-form-wrap" novalidate>
                <div class="hs-form-card">
                  <div class="hs-form-grid">
                    <div class="hs-field">
                      <label for="patientName">Name</label>
                      <input id="patientName" class="hs-input" type="text" readonly />
                    </div>
                    <div class="hs-field">
                      <label for="patientAge">Age</label>
                      <input id="patientAge" class="hs-input" type="text" readonly />
                    </div>
                  </div>
                </div>

                <div class="hs-form-card">
                  <div class="hs-field">
                    <label for="pastDiseases">Past Diseases</label>
                    <textarea id="pastDiseases" class="hs-textarea" placeholder="List any past illnesses or conditions"></textarea>
                  </div>
                  <div class="hs-field" style="margin-top: 12px;">
                    <label for="allergies">Allergies</label>
                    <textarea id="allergies" class="hs-textarea" placeholder="Food, drug, or environmental allergies"></textarea>
                  </div>
                  <div class="hs-field" style="margin-top: 12px;">
                    <label for="currentMeds">Current Medications</label>
                    <textarea id="currentMeds" class="hs-textarea" placeholder="List current medications and doses"></textarea>
                  </div>
                  <div class="hs-field" style="margin-top: 12px;">
                    <label for="familyHistory">Family History</label>
                    <textarea id="familyHistory" class="hs-textarea" placeholder="Any hereditary conditions in family"></textarea>
                  </div>
                </div>

                <div class="hs-actions">
                  <button class="hs-submit" type="submit">Submit Medical History</button>
                  <span class="hs-note">You can edit later if needed.</span>
                </div>
              </form>
            </section>
          </section>
        </div>
      </div>
    </article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function () {
      const SUPABASE_URL = "https://nfmzosvedtieicnfbmlh.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5mbXpvc3ZlZHRpZWljbmZibWxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzk1MDgsImV4cCI6MjA5MDYxNTUwOH0.UWGk4L8AQu-5NfpknMKizvFmAcyX6QgUmqOGSr1G6Wc";

      function getSupabaseClient() {
        if (typeof supabase === "undefined" || !supabase.createClient) {
          return null;
        }
        return supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }

      const query = new URLSearchParams(window.location.search);
      const patientId = query.get("id") || "";

      async function resolvePatientId() {
        if (patientId) return patientId;
        const client = getSupabaseClient();
        if (!client) return "";
        const userResult = await client.auth.getUser();
        if (userResult.error || !userResult.data || !userResult.data.user) {
          return "";
        }
        return userResult.data.user.id || "";
      }

      async function loadProfile() {
        const client = getSupabaseClient();
        if (!client) return;
        const id = await resolvePatientId();
        if (!id) return;

        const { data, error } = await client
          .from("patient_profile")
          .select("name,age")
          .eq("user_id", id)
          .maybeSingle();

        if (error || !data) return;

        document.getElementById("patientName").value = data.name || "";
        document.getElementById("patientAge").value = data.age || "";
      }

      loadProfile();

      document.getElementById("historyForm").addEventListener("submit", function (event) {
        event.preventDefault();
        const query = new URLSearchParams(window.location.search);
        const patientId = query.get("id") || "default";
        const filledKey = "hs_filled_forms_" + patientId;
        let filled = [];
        try {
          const raw = window.localStorage.getItem(filledKey);
          filled = raw ? JSON.parse(raw) : [];
          if (!Array.isArray(filled)) filled = [];
        } catch (_err) {
          filled = [];
        }
        if (!filled.includes("Medical History Form")) {
          filled.push("Medical History Form");
          window.localStorage.setItem(filledKey, JSON.stringify(filled));
        }
        const suffix = patientId ? "?id=" + encodeURIComponent(patientId) : "";
        window.location.href = "form.html" + suffix;
      });
    })();
  </script>
</body>
</html>
