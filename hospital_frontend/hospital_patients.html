<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patients - HealthSphere Hospital</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy:#0f2b63; --blue:#0b4ea2; --sky:#17a2b8; --text:#17233d; --muted:#5d6f8f; --line:#dce6f2; }
    body { min-height:100vh; font-family:Poppins, Arial, sans-serif; background:radial-gradient(circle at top left, rgba(23,162,184,.15), transparent 22%), linear-gradient(180deg, #f7fbff 0%, #edf4fb 100%); color:var(--text); padding:24px; }
    .dashboard { max-width:1320px; margin:0 auto; display:flex; gap:18px; align-items:flex-start; min-height:calc(100vh - 48px); }
    .sidebar-shell { width:138px; flex:0 0 138px; background:linear-gradient(180deg, var(--navy), #14346b 56%, #0c204f); border-radius:26px; box-shadow:0 18px 42px rgba(15,43,99,.18); padding:16px 12px; }
    .sidebar { display:grid; gap:22px; align-content:start; }
    .side-link { min-height:76px; border-radius:18px; padding:10px 8px; background:rgba(255,255,255,.08); color:#eef4ff; text-decoration:none; display:grid; justify-items:center; align-content:center; gap:8px; text-align:center; }
    .side-link.active { background:rgba(255,255,255,.22); border:1px solid rgba(255,255,255,.14); }
    .side-link span { width:40px; height:40px; border-radius:14px; background:rgba(255,255,255,.12); display:grid; place-items:center; font-size:18px; }
    .side-link small { font-size:12px; line-height:1.2; font-weight:700; }
    .content { flex:1; display:grid; gap:22px; }
    .brand-row { display:flex; align-items:center; gap:12px; padding:6px 2px 0; }
    .brand-logo { width:38px; height:38px; border-radius:12px; background:linear-gradient(135deg, #2d75d7, #0f56b9); color:#fff; display:grid; place-items:center; box-shadow:0 12px 26px rgba(11,78,162,.22); }
    .brand-name { font-size:20px; font-weight:800; color:#1a2741; }
    .page-card { background:#fff; border:1px solid var(--line); border-radius:26px; padding:28px; box-shadow:0 14px 30px rgba(23,35,61,.06); }
    .page-card h1 { font-size:clamp(30px, 4vw, 42px); margin-bottom:8px; }
    .page-card p { color:var(--muted); line-height:1.6; }
    .search-wrap { margin-top:22px; display:grid; gap:10px; }
    .search-note {
      display: inline-flex;
      width: max-content;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #eef4ff;
      border: 1px solid #d6e4f8;
      color: #34517f;
      font-size: 13px;
      font-weight: 700;
    }
    .search-bar { width:100%; border:1px solid var(--line); border-radius:18px; padding:16px 18px; font-size:15px; outline:none; }
    .search-bar:focus { border-color:var(--blue); box-shadow:0 0 0 4px rgba(11,78,162,.12); }
    .result-grid { margin-top:22px; display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:16px; }
    .patient-card { text-decoration:none; color:inherit; border:1px solid var(--line); border-radius:22px; padding:20px; background:linear-gradient(180deg, #fff, #f7fbff); box-shadow:0 12px 24px rgba(23,35,61,.04); display:grid; gap:12px; }
    .patient-avatar { width:58px; height:58px; border-radius:18px; background:linear-gradient(135deg, rgba(11,78,162,.12), rgba(23,162,184,.18)); color:var(--blue); display:grid; place-items:center; font-size:22px; }
    .patient-card h3 { font-size:22px; }
    .patient-card p { font-size:14px; }
    .patient-meta { display:grid; gap:8px; color:#3f5377; font-size:14px; }
    .patient-meta span { display:flex; align-items:center; gap:8px; }
    .empty-state { margin-top:22px; border:1px dashed #bfd1ea; border-radius:22px; padding:30px; text-align:center; color:var(--muted); background:#f8fbff; }
    @media (max-width:980px) { .dashboard { display:grid; } .sidebar-shell { width:100%; } .sidebar { grid-template-columns:repeat(3, minmax(0, 1fr)); } }
    @media (max-width:640px) { body { padding:12px; } .sidebar { grid-template-columns:repeat(2, minmax(0, 1fr)); } .page-card { padding:20px; } }
  </style>
</head>
<body>
  <main class="dashboard">
    <aside class="sidebar-shell">
      <nav class="sidebar" aria-label="Hospital sections">
        <a class="side-link" href="hospital_home.html"><span><i class="fa-solid fa-house"></i></span><small>Home</small></a>
        <a class="side-link" href="hospital_doctors.html"><span><i class="fa-solid fa-user-doctor"></i></span><small>Add Doctors</small></a>
        <a class="side-link" href="hospital_bed_availability.html"><span><i class="fa-solid fa-bed"></i></span><small>Bed Availability</small></a>
        <a class="side-link" href="hospital_appointments.html"><span><i class="fa-solid fa-calendar-check"></i></span><small>Appointments</small></a>
        <a class="side-link active" href="hospital_patients.html"><span><i class="fa-solid fa-hospital-user"></i></span><small>Patient</small></a>
        <a class="side-link" href="hospital_emergency.html"><span><i class="fa-solid fa-truck-medical"></i></span><small>Emergency</small></a>
      </nav>
    </aside>
    <section class="content">
      <div class="brand-row">
        <div class="brand-logo"><i class="fa-solid fa-heart-pulse"></i></div>
        <div class="brand-name">HealthSphere</div>
      </div>
      <section class="page-card">
        <h1>Patients</h1>
        <div class="search-wrap">
          <input id="patientSearch" class="search-bar" type="text" placeholder="Search patient name" />
        </div>
        <div id="resultGrid" class="result-grid" aria-live="polite"></div>
        <div id="emptyState" class="empty-state" hidden>No real patient matched this search.</div>
      </section>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../hospital_backend/hospital_patients.js"></script>
  <script>
    const searchInput = document.getElementById("patientSearch");
    const resultGrid = document.getElementById("resultGrid");
    const emptyState = document.getElementById("emptyState");
    let patients = [];

    function renderPatientCards(rows) {
      resultGrid.innerHTML = rows.map((patient) => `
        <a class="patient-card" href="hospital_patient_details.html?id=${patient.id}">
          <div class="patient-avatar"><i class="fa-solid fa-user"></i></div>
          <div>
            <h3>${patient.name}</h3>
          </div>
          <div class="patient-meta">
            <span><i class="fa-solid fa-droplet"></i>${patient.bloodGroup || "-"}</span>
            <span><i class="fa-solid fa-phone"></i>${patient.phone || "-"}</span>
          </div>
        </a>
      `).join("");
    }

    function renderPatients(query) {
      const normalizedQuery = query.trim().toLowerCase();
      const filteredPatients = patients.filter((patient) => {
        return patient.name.toLowerCase().includes(normalizedQuery);
      });

      if (!normalizedQuery) {
        emptyState.hidden = patients.length > 0;
        renderPatientCards(patients);
        return;
      }

      if (!filteredPatients.length) {
        resultGrid.innerHTML = "";
        emptyState.hidden = false;
        return;
      }

      emptyState.hidden = true;
      renderPatientCards(filteredPatients);
    }

    async function initPatients() {
      patients = await loadPatients();
      renderPatients("");
    }

    initPatients();
    searchInput.addEventListener("input", function () {
      renderPatients(searchInput.value);
    });
  </script>
</body>
</html>
