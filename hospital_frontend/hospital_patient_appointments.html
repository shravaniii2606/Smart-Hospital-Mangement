<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Appointments - HealthSphere Hospital</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy:#0f2b63; --blue:#0b4ea2; --sky:#17a2b8; --text:#17233d; --muted:#5d6f8f; --line:#dce6f2; }
    body { min-height:100vh; font-family:Poppins, Arial, sans-serif; background:radial-gradient(circle at top left, rgba(23,162,184,.15), transparent 22%), linear-gradient(180deg, #f7fbff 0%, #edf4fb 100%); color:var(--text); padding:24px; }
    .dashboard { max-width:1320px; margin:0 auto; display:flex; gap:18px; align-items:flex-start; min-height:calc(100vh - 48px); }
    .sidebar-shell { width:138px; flex:0 0 138px; background:linear-gradient(180deg, var(--navy), #14346b 56%, #0c204f); border-radius:26px; box-shadow:0 18px 42px rgba(15,43,99,.18); padding:16px 12px; }
    .sidebar { display:grid; gap:22px; align-content:start; }
    .side-link { min-height:76px; border-radius:18px; padding:10px 8px; background:rgba(255,255,255,.08); color:#eef4ff; text-decoration:none; display:grid; justify-items:center; align-content:center; gap:8px; text-align:center; }
    .side-link.active { background:rgba(255,255,255,.22); border:1px solid rgba(255,255,255,.14); }
    .side-link span { width:40px; height:40px; border-radius:14px; background:rgba(255,255,255,.12); display:grid; place-items:center; font-size:18px; }
    .side-link small { font-size:12px; line-height:1.2; font-weight:700; }
    .content { flex:1; display:grid; gap:22px; }
    .brand-row { display:flex; align-items:center; gap:12px; padding:6px 2px 0; }
    .brand-logo { width:38px; height:38px; border-radius:12px; background:linear-gradient(135deg, #2d75d7, #0f56b9); color:#fff; display:grid; place-items:center; box-shadow:0 12px 26px rgba(11,78,162,.22); }
    .brand-name { font-size:20px; font-weight:800; color:#1a2741; }
    .page-card { background:#fff; border:1px solid var(--line); border-radius:26px; padding:28px; box-shadow:0 14px 30px rgba(23,35,61,.06); }
    .page-card h1 { font-size:clamp(30px, 4vw, 42px); margin-bottom:8px; }
    .page-card p { color:var(--muted); line-height:1.6; }
    .appointment-list { margin-top:22px; display:grid; gap:14px; }
    .appointment-card { border:1px solid var(--line); border-radius:22px; padding:20px; background:linear-gradient(180deg, #fff, #f8fbff); display:grid; gap:10px; }
    .appointment-card h3 { font-size:22px; }
    .appointment-meta { display:grid; gap:8px; color:#41557a; font-size:14px; }
    .appointment-meta span { display:flex; align-items:center; gap:8px; }
    .status-chip { display:inline-flex; width:max-content; border-radius:999px; padding:8px 12px; font-size:13px; font-weight:700; background:#e7f2ff; color:var(--blue); }
    .button-secondary { margin-top:20px; display:inline-flex; text-decoration:none; color:var(--blue); background:#eef4ff; border:1px solid #cfe0f7; border-radius:16px; padding:14px 18px; font-weight:700; gap:10px; align-items:center; }
    @media (max-width:980px) { .dashboard { display:grid; } .sidebar-shell { width:100%; } .sidebar { grid-template-columns:repeat(3, minmax(0, 1fr)); } }
    @media (max-width:640px) { body { padding:12px; } .sidebar { grid-template-columns:repeat(2, minmax(0, 1fr)); } .page-card { padding:20px; } }
  </style>
</head>
<body>
  <main class="dashboard">
    <aside class="sidebar-shell">
      <nav class="sidebar" aria-label="Hospital sections">
        <a class="side-link" href="hospital_home.html"><span><i class="fa-solid fa-house"></i></span><small>Home</small></a>
        <a class="side-link" href="hospital_doctors.html"><span><i class="fa-solid fa-user-doctor"></i></span><small>Add Doctors</small></a>
        <a class="side-link" href="hospital_bed_availability.html"><span><i class="fa-solid fa-bed"></i></span><small>Bed Availability</small></a>
        <a class="side-link active" href="hospital_appointments.html"><span><i class="fa-solid fa-calendar-check"></i></span><small>Appointments</small></a>
        <a class="side-link active" href="hospital_patients.html"><span><i class="fa-solid fa-hospital-user"></i></span><small>Patient</small></a>
        <a class="side-link" href="hospital_emergency.html"><span><i class="fa-solid fa-truck-medical"></i></span><small>Emergency</small></a>
      </nav>
    </aside>
    <section class="content">
      <div class="brand-row">
        <div class="brand-logo"><i class="fa-solid fa-heart-pulse"></i></div>
        <div class="brand-name">HealthSphere</div>
      </div>
      <section class="page-card">
        <h1 id="pageTitle">Patient Appointments</h1>
        <p id="pageSubtitle">Appointments scheduled for this patient.</p>
        <div id="appointmentList" class="appointment-list"></div>
        <a id="backLink" class="button-secondary" href="#"><i class="fa-solid fa-arrow-left"></i><span>Back to Patient Details</span></a>
      </section>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../hospital_backend/hospital_patients.js"></script>
  <script>
    function parseTimeToMinutes(value) {
      if (!value) return Number.MAX_SAFE_INTEGER;
      const cleaned = value.trim().toLowerCase();
      const match = cleaned.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)?/);
      if (!match) return Number.MAX_SAFE_INTEGER;

      let hours = Number(match[1]);
      const minutes = Number(match[2] || "0");
      const suffix = match[3];

      if (Number.isNaN(hours) || Number.isNaN(minutes)) {
        return Number.MAX_SAFE_INTEGER;
      }

      if (suffix === "pm" && hours < 12) hours += 12;
      if (suffix === "am" && hours === 12) hours = 0;

      return (hours * 60) + minutes;
    }

    function compareAppointments(left, right) {
      const leftDate = left?.date || "";
      const rightDate = right?.date || "";
      if (leftDate !== rightDate) {
        return leftDate.localeCompare(rightDate);
      }

      const leftMinutes = parseTimeToMinutes(left?.time);
      const rightMinutes = parseTimeToMinutes(right?.time);
      if (leftMinutes !== rightMinutes) {
        return leftMinutes - rightMinutes;
      }

      return 0;
    }

    (async function () {
      const query = new URLSearchParams(window.location.search);
      const patientId = query.get("id");
      const patient = patientId ? await getPatientById(patientId) : null;
      const appointmentList = document.getElementById("appointmentList");
      const backLink = document.getElementById("backLink");

      if (!patient) {
        document.getElementById("pageTitle").textContent = "Patient Not Found";
        document.getElementById("pageSubtitle").textContent = "The requested patient record could not be found.";
        appointmentList.innerHTML = "";
        backLink.href = "hospital_patients.html";
        return;
      }

      document.getElementById("pageTitle").textContent = `${patient.name} Appointments`;
      document.getElementById("pageSubtitle").textContent = "Booked and upcoming appointments for this patient.";
      backLink.href = `hospital_patient_details.html?id=${patient.id}`;
      const sortedAppointments = (patient.appointments || []).slice().sort(compareAppointments);
      appointmentList.innerHTML = sortedAppointments.map((appointment) => `
        <article class="appointment-card">
          <h3>${appointment.department}</h3>
          <div class="appointment-meta">
            <span><i class="fa-solid fa-calendar-day"></i>${appointment.date}</span>
            <span><i class="fa-regular fa-clock"></i>${appointment.time}</span>
            <span><i class="fa-solid fa-user-doctor"></i>${appointment.doctor}</span>
            <span><i class="fa-solid fa-ticket"></i>Token ${appointment.token || "-"}</span>
          </div>
          <span class="status-chip">${appointment.status}</span>
        </article>
      `).join("");
    })();
  </script>
</body>
</html>
