<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appointments - HealthSphere Hospital</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy:#0f2b63; --blue:#0b4ea2; --sky:#17a2b8; --text:#17233d; --muted:#5d6f8f; --line:#dce6f2; }
    body { min-height:100vh; font-family:Poppins, Arial, sans-serif; background:radial-gradient(circle at top left, rgba(23,162,184,.15), transparent 22%), linear-gradient(180deg, #f7fbff 0%, #edf4fb 100%); color:var(--text); padding:24px; }
    .dashboard { max-width:1320px; margin:0 auto; display:flex; gap:18px; align-items:flex-start; min-height:calc(100vh - 48px); }
    .sidebar-shell { width:138px; flex:0 0 138px; background:linear-gradient(180deg, var(--navy), #14346b 56%, #0c204f); border-radius:26px; box-shadow:0 18px 42px rgba(15,43,99,.18); padding:16px 12px; }
    .sidebar { display:grid; gap:22px; align-content:start; }
    .side-link { min-height:76px; border-radius:18px; padding:10px 8px; background:rgba(255,255,255,.08); color:#eef4ff; text-decoration:none; display:grid; justify-items:center; align-content:center; gap:8px; text-align:center; }
    .side-link.active { background:rgba(255,255,255,.22); border:1px solid rgba(255,255,255,.14); }
    .side-link span { width:40px; height:40px; border-radius:14px; background:rgba(255,255,255,.12); display:grid; place-items:center; font-size:18px; }
    .side-link small { font-size:12px; line-height:1.2; font-weight:700; }
    .content { flex:1; display:grid; gap:22px; }
    .brand-row { display:flex; align-items:center; gap:12px; padding:6px 2px 0; }
    .brand-logo { width:38px; height:38px; border-radius:12px; background:linear-gradient(135deg, #2d75d7, #0f56b9); color:#fff; display:grid; place-items:center; box-shadow:0 12px 26px rgba(11,78,162,.22); }
    .brand-name { font-size:20px; font-weight:800; color:#1a2741; }
    .page-card { background:#fff; border:1px solid var(--line); border-radius:26px; padding:28px; box-shadow:0 14px 30px rgba(23,35,61,.06); }
    .page-head { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:22px; }
    .page-head h1 { font-size:clamp(30px, 4vw, 42px); margin-bottom:8px; }
    .page-head p { color:var(--muted); max-width:620px; line-height:1.6; }
    .appointments-list { display:grid; gap:16px; }
    .appointment-card { border:1px solid var(--line); border-radius:22px; padding:20px; background:linear-gradient(180deg, #fff, #f6faff); box-shadow:0 12px 24px rgba(23,35,61,.04); }
    .appointment-header { display:flex; justify-content:space-between; align-items:start; margin-bottom:12px; }
    .appointment-header h3 { margin:0; font-size:20px; }
    .appointment-details { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:12px; margin-bottom:16px; }
    .detail-item { display:flex; flex-direction:column; }
    .detail-label { font-size:12px; color:var(--muted); font-weight:600; margin-bottom:4px; }
    .detail-value { font-size:14px; color:var(--text); }
    .appointment-actions { display:flex; gap:12px; }
    .status-badge { border-radius:14px; padding:4px 10px; font-size:12px; font-weight:700; text-transform:capitalize; }
    .status-badge.pending { background:#fff3cd; color:#856404; border:1px solid #ffeeba; }
    .status-badge.approved { background:#d4edda; color:#155724; border:1px solid #c3e6cb; }
    .status-badge.cancelled { background:#f8d7da; color:#721c24; border:1px solid #f5c6cb; }
    .button { border:0; border-radius:16px; padding:12px 16px; font-size:14px; font-weight:700; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; gap:8px; }
    .button-danger { color:#fff; background:linear-gradient(135deg, #c53b3b, #e16464); box-shadow:0 10px 20px rgba(197,59,59,.18); }
    .empty-state { border:1px dashed #bfd1ea; border-radius:22px; padding:40px; text-align:center; color:var(--muted); background:#f8fbff; }
    @media (max-width:980px) { .dashboard { display:grid; } .sidebar-shell { width:100%; } .sidebar { grid-template-columns:repeat(3, minmax(0, 1fr)); } .page-head { flex-direction:column; } }
    @media (max-width:640px) { body { padding:12px; } .sidebar { grid-template-columns:repeat(2, minmax(0, 1fr)); } .page-card { padding:20px; } .appointment-details { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main class="dashboard">
    <aside class="sidebar-shell">
      <nav class="sidebar" aria-label="Hospital sections">
        <a class="side-link" href="hospital_home.html"><span><i class="fa-solid fa-house"></i></span><small>Home</small></a>
        <a class="side-link" href="hospital_doctors.html"><span><i class="fa-solid fa-user-doctor"></i></span><small>Add Doctors</small></a>
        <a class="side-link" href="hospital_bed_availability.html"><span><i class="fa-solid fa-bed"></i></span><small>Bed Availability</small></a>
        <a class="side-link active" href="hospital_appointments.html"><span><i class="fa-solid fa-calendar-check"></i></span><small>Appointments</small></a>
        <a class="side-link" href="hospital_patients.html"><span><i class="fa-solid fa-hospital-user"></i></span><small>Patient</small></a>
        <a class="side-link" href="hospital_emergency.html"><span><i class="fa-solid fa-truck-medical"></i></span><small>Emergency</small></a>
      </nav>
    </aside>
    <section class="content">
      <div class="brand-row">
        <div class="brand-logo"><i class="fa-solid fa-heart-pulse"></i></div>
        <div class="brand-name">HealthSphere</div>
      </div>
      <section class="page-card">
        <div class="page-head">
          <div>
            <h1>Appointment Requests</h1>
          </div>
          <div>
            <label for="statusFilter" style="font-weight:700; color:var(--muted);">Filter by status:&nbsp;</label>
            <select id="statusFilter" style="border:1px solid var(--line); border-radius:12px; padding:8px;">
              <option value="">All</option>
              <option value="pending">Pending</option>
              <option value="approved">Approved</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
        </div>
        <div id="appointmentsList" class="appointments-list"></div>
        <div id="emptyState" class="empty-state" hidden>No appointment requests at this time.</div>
      </section>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../hospital_backend/hospital_doctors.js"></script>
  <script>
    function getSupabaseClient() {
      if (typeof supabase === "undefined" || !supabase.createClient) {
        throw new Error("Supabase library not loaded. Check the script tag.");
      }
      return supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    async function loadAppointments(statusFilter = null) {
      const supabase = getSupabaseClient();
      let query = supabase.from('appointments').select('*').order('appointment_date', { ascending: true }).order('appointment_time', { ascending: true });
      if (statusFilter) {
        query = query.eq('status', statusFilter);
      }

      const { data: appointments, error } = await query;
      
      if (error) {
        console.error('Error loading appointments:', error);
        return [];
      }

      if (!appointments || appointments.length === 0) {
        return [];
      }

      // Fetch patient names for display (in case appointment only stores user_id)
      const userIds = [...new Set((appointments || []).map((appt) => appt.user_id).filter(Boolean))];
      let patientMap = {};

      if (userIds.length > 0) {
        const { data: patients, error: patientError } = await supabase
          .from('patient_profile')
          .select('user_id,name')
          .in('user_id', userIds);

        if (patientError) {
          console.warn('Could not load patient names:', patientError);
        } else {
          patientMap = (patients || []).reduce((map, patient) => {
            map[patient.user_id] = patient.name;
            return map;
          }, {});
        }
      }

      const appointmentsWithNames = (appointments || []).map((appt) => ({
        ...appt,
        patient_name: patientMap[appt.user_id] || appt.patient_name || 'Patient'
      }));

      return appointmentsWithNames.sort(compareAppointments);
    }

    function compareAppointments(left, right) {
      const leftDate = left?.appointment_date || '';
      const rightDate = right?.appointment_date || '';
      if (leftDate !== rightDate) {
        return leftDate.localeCompare(rightDate);
      }

      const leftTime = left?.appointment_time || '';
      const rightTime = right?.appointment_time || '';
      if (leftTime !== rightTime) {
        return leftTime.localeCompare(rightTime);
      }

      const leftToken = Number(left?.token || 0);
      const rightToken = Number(right?.token || 0);
      if (!Number.isNaN(leftToken) && !Number.isNaN(rightToken) && leftToken !== rightToken) {
        return leftToken - rightToken;
      }

      return 0;
    }

    function renderAppointments(appointments) {
      const listEl = document.getElementById("appointmentsList");
      const emptyEl = document.getElementById("emptyState");
      const sortedAppointments = (appointments || []).slice().sort(compareAppointments);

      if (!sortedAppointments || sortedAppointments.length === 0) {
        listEl.innerHTML = "";
        emptyEl.hidden = false;
        return;
      }

      emptyEl.hidden = true;
      
      let html = '';
      for (const appt of sortedAppointments) {
        const statusValue = (appt.status || "pending").toLowerCase();
        let actionOptions = "";
        if (statusValue === "approved") {
          actionOptions = `<label><input type="radio" name="status-${appt.id}" value="cancelled"> Cancel</label>`;
        } else if (statusValue === "cancelled") {
          actionOptions = `<label><input type="radio" name="status-${appt.id}" value="approved"> Approve</label>`;
        } else {
          actionOptions = `
              <label><input type="radio" name="status-${appt.id}" value="approved"> Approve</label>
              <label><input type="radio" name="status-${appt.id}" value="cancelled"> Cancel</label>
          `;
        }

        html += `
        <div class="appointment-card">
          <div class="appointment-header">
            <h3>${appt.patient_name || "Patient"} → ${appt.doctor_name || "Doctor"}</h3>
            <span class="status-badge ${appt.status || 'pending'}">${appt.status || 'pending'}</span>
            <div class="appointment-actions">
              ${actionOptions}
              <button class="button button-primary" data-update-id="${appt.id}">Update</button>
            </div>
          </div>
          <div class="appointment-details">
            <div class="detail-item">
              <div class="detail-label">Doctor Specialty</div>
              <div class="detail-value">${appt.doctor_specialty || "-"}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Appointment Date</div>
              <div class="detail-value">${appt.appointment_date || "-"}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Appointment Time</div>
              <div class="detail-value">${appt.appointment_time || "-"}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Consultation Mode</div>
              <div class="detail-value">${appt.mode || "-"}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Token Number</div>
              <div class="detail-value">${appt.token || "-"}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Reason for Visit</div>
              <div class="detail-value">${appt.reason || "-"}</div>
            </div>
            ${appt.notes ? `
            <div class="detail-item" style="grid-column: 1 / -1;">
              <div class="detail-label">Additional Notes</div>
              <div class="detail-value">${appt.notes}</div>
            </div>
            ` : ""}
          </div>
        </div>
        `;
      }
      
      listEl.innerHTML = html;
    }

    async function updateAppointmentStatus(appointmentId, status) {
      const supabase = getSupabaseClient();
      const { error } = await supabase
        .from('appointments')
        .update({ status: status })
        .eq('id', appointmentId);

      if (error) {
        console.error('Error updating appointment:', error);
        throw error;
      }
    }

    let currentStatusFilter = null;

    async function loadAndRenderAppointments() {
      try {
        const appointments = await loadAppointments(currentStatusFilter);
        renderAppointments(appointments);
      } catch (error) {
        console.error('Error loading appointments:', error);
      }
    }

    document.addEventListener("DOMContentLoaded", function () {
      const statusFilterSelect = document.getElementById('statusFilter');
      if (!statusFilterSelect) {
        console.error('statusFilter select element not found!');
        return;
      }
      
      statusFilterSelect.addEventListener('change', async (event) => {
        currentStatusFilter = event.target.value || null;
        await loadAndRenderAppointments();
      });

      loadAndRenderAppointments();

      document.getElementById("appointmentsList").addEventListener("click", async (event) => {
        const updateBtn = event.target.closest("[data-update-id]");
        if (!updateBtn) return;

        const appointmentId = updateBtn.getAttribute("data-update-id");
        const radios = document.querySelectorAll(`input[name="status-${appointmentId}"]:checked`);
        if (radios.length === 0) {
          alert("Please select Approve or Cancel.");
          return;
        }

        const status = radios[0].value;

        try {
          await updateAppointmentStatus(appointmentId, status);
          await loadAndRenderAppointments();
        } catch (error) {
          alert("Error updating appointment. Please try again.");
        }
      });
    });
  </script>
</body>
</html>
