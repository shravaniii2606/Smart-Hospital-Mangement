<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Reports - HealthSphere Hospital</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy:#0f2b63; --blue:#0b4ea2; --sky:#17a2b8; --text:#17233d; --muted:#5d6f8f; --line:#dce6f2; }
    body { min-height:100vh; font-family:Poppins, Arial, sans-serif; background:radial-gradient(circle at top left, rgba(23,162,184,.15), transparent 22%), linear-gradient(180deg, #f7fbff 0%, #edf4fb 100%); color:var(--text); padding:24px; }
    .dashboard { max-width:1320px; margin:0 auto; display:flex; gap:18px; align-items:flex-start; min-height:calc(100vh - 48px); }
    .sidebar-shell { width:138px; flex:0 0 138px; background:linear-gradient(180deg, var(--navy), #14346b 56%, #0c204f); border-radius:26px; box-shadow:0 18px 42px rgba(15,43,99,.18); padding:16px 12px; }
    .sidebar { display:grid; gap:22px; align-content:start; }
    .side-link { min-height:76px; border-radius:18px; padding:10px 8px; background:rgba(255,255,255,.08); color:#eef4ff; text-decoration:none; display:grid; justify-items:center; align-content:center; gap:8px; text-align:center; }
    .side-link.active { background:rgba(255,255,255,.22); border:1px solid rgba(255,255,255,.14); }
    .side-link span { width:40px; height:40px; border-radius:14px; background:rgba(255,255,255,.12); display:grid; place-items:center; font-size:18px; }
    .side-link small { font-size:12px; line-height:1.2; font-weight:700; }
    .content { flex:1; display:grid; gap:22px; }
    .brand-row { display:flex; align-items:center; gap:12px; padding:6px 2px 0; }
    .brand-logo { width:38px; height:38px; border-radius:12px; background:linear-gradient(135deg, #2d75d7, #0f56b9); color:#fff; display:grid; place-items:center; box-shadow:0 12px 26px rgba(11,78,162,.22); }
    .brand-name { font-size:20px; font-weight:800; color:#1a2741; }
    .page-grid { display:grid; grid-template-columns:1.1fr .9fr; gap:18px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:26px; padding:28px; box-shadow:0 14px 30px rgba(23,35,61,.06); }
    .card h1, .card h2 { margin-bottom:8px; }
    .card p { color:var(--muted); line-height:1.6; }
    .report-list { margin-top:22px; display:grid; gap:14px; }
    .report-card { border:1px solid var(--line); border-radius:22px; padding:20px; background:linear-gradient(180deg, #fff, #f8fbff); display:grid; gap:10px; }
    .report-head { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .report-date { color:#4d638a; font-size:13px; font-weight:700; }
    .report-link { display:inline-flex; width:max-content; align-items:center; gap:8px; text-decoration:none; color:var(--blue); background:#eef4ff; border:1px solid #cfe0f7; border-radius:14px; padding:10px 14px; font-weight:700; }
    .upload-form { margin-top:10px; display:grid; gap:14px; }
    .field { display:grid; gap:8px; }
    label { font-size:14px; font-weight:700; }
    .input, textarea { width:100%; border:1px solid var(--line); border-radius:16px; padding:14px 16px; font-size:15px; font-family:inherit; outline:none; }
    .input:focus, textarea:focus { border-color:var(--blue); box-shadow:0 0 0 4px rgba(11,78,162,.12); }
    textarea { resize:vertical; min-height:110px; }
    .upload-button { border:0; border-radius:16px; padding:14px 18px; font-size:15px; font-weight:700; cursor:pointer; color:#fff; background:linear-gradient(135deg, var(--blue), var(--sky)); box-shadow:0 14px 24px rgba(11,78,162,.2); }
    .error { min-height:20px; color:#c53b3b; font-size:13px; }
    .back-link { display:inline-flex; margin-top:18px; text-decoration:none; color:var(--blue); background:#eef4ff; border:1px solid #cfe0f7; border-radius:16px; padding:14px 18px; font-weight:700; gap:10px; align-items:center; }
    @media (max-width:980px) { .dashboard { display:grid; } .sidebar-shell { width:100%; } .sidebar { grid-template-columns:repeat(3, minmax(0, 1fr)); } .page-grid { grid-template-columns:1fr; } }
    @media (max-width:640px) { body { padding:12px; } .sidebar { grid-template-columns:repeat(2, minmax(0, 1fr)); } .card { padding:20px; } }
  </style>
</head>
<body>
  <main class="dashboard">
    <aside class="sidebar-shell">
      <nav class="sidebar" aria-label="Hospital sections">
        <a class="side-link" href="hospital_home.html"><span><i class="fa-solid fa-house"></i></span><small>Home</small></a>
        <a class="side-link" href="hospital_doctors.html"><span><i class="fa-solid fa-user-doctor"></i></span><small>Add Doctors</small></a>
        <a class="side-link" href="#"><span><i class="fa-solid fa-bed"></i></span><small>Bed Availability</small></a>
        <a class="side-link" href="#"><span><i class="fa-solid fa-calendar-check"></i></span><small>Appointments</small></a>
        <a class="side-link active" href="hospital_patients.html"><span><i class="fa-solid fa-hospital-user"></i></span><small>Patient</small></a>
        <a class="side-link" href="hospital_patients.html"><span><i class="fa-solid fa-notes-medical"></i></span><small>Patient</small></a>
        <a class="side-link" href="#"><span><i class="fa-solid fa-truck-medical"></i></span><small>Emergency</small></a>
      </nav>
    </aside>
    <section class="content">
      <div class="brand-row">
        <div class="brand-logo"><i class="fa-solid fa-heart-pulse"></i></div>
        <div class="brand-name">HealthSphere</div>
      </div>
      <section class="page-grid">
        <article class="card">
          <h1 id="pageTitle">Patient Reports</h1>
          <p id="pageSubtitle">All current and previous reports for this patient.</p>
          <div id="reportList" class="report-list"></div>
          <a id="backLink" class="back-link" href="#"><i class="fa-solid fa-arrow-left"></i><span>Back to Patient Details</span></a>
        </article>
        <article class="card">
          <h2>Add Report</h2>
          <p>Upload a new report file such as PNG, JPEG, PDF, or similar supported formats for this patient.</p>
          <form id="reportForm" class="upload-form" novalidate>
            <div class="field">
              <label for="reportTitle">Report Title</label>
              <input id="reportTitle" class="input" type="text" placeholder="Enter report title" required />
            </div>
            <div class="field">
              <label for="reportSummary">Summary</label>
              <textarea id="reportSummary" placeholder="Add a short report summary." required></textarea>
            </div>
            <div class="field">
              <label for="reportFile">Upload File</label>
              <input id="reportFile" class="input" type="file" accept=".png,.jpg,.jpeg,.pdf,.webp,.gif" required />
            </div>
            <p id="formError" class="error" aria-live="polite"></p>
            <button class="upload-button" type="submit">Add Report</button>
          </form>
        </article>
      </section>
    </section>
  </main>
  <script src="hospital_patients.js"></script>
  <script>
    const query = new URLSearchParams(window.location.search);
    const patientId = query.get("id");
    const patient = patientId ? getPatientById(patientId) : null;
    const pageTitle = document.getElementById("pageTitle");
    const pageSubtitle = document.getElementById("pageSubtitle");
    const reportList = document.getElementById("reportList");
    const reportForm = document.getElementById("reportForm");
    const formError = document.getElementById("formError");
    const backLink = document.getElementById("backLink");

    function renderReports(currentPatient) {
      reportList.innerHTML = (currentPatient.reports || []).map((report) => {
        const fileLink = report.fileData
          ? `<a class="report-link" href="${report.fileData}" download="${report.fileName}"><i class="fa-solid fa-paperclip"></i><span>${report.fileName}</span></a>`
          : `<span class="report-link"><i class="fa-regular fa-file"></i><span>${report.fileName}</span></span>`;

        return `
          <article class="report-card">
            <div class="report-head">
              <div>
                <h3>${report.title}</h3>
                <p>${report.summary}</p>
              </div>
              <span class="report-date">${report.date}</span>
            </div>
            ${fileLink}
          </article>
        `;
      }).join("");
    }

    if (!patient) {
      pageTitle.textContent = "Patient Not Found";
      pageSubtitle.textContent = "The requested patient record could not be found.";
      reportForm.hidden = true;
      backLink.href = "hospital_patients.html";
    } else {
      pageTitle.textContent = `${patient.name} Reports`;
      pageSubtitle.textContent = "Current and historical reports for this patient.";
      backLink.href = `hospital_patient_details.html?id=${patient.id}`;
      renderReports(patient);
    }

    reportForm.addEventListener("submit", function (event) {
      event.preventDefault();

      if (!patient) {
        return;
      }

      const reportTitle = document.getElementById("reportTitle").value.trim();
      const reportSummary = document.getElementById("reportSummary").value.trim();
      const reportFile = document.getElementById("reportFile").files[0];

      if (!reportTitle || !reportSummary || !reportFile) {
        formError.textContent = "Please fill all report fields and choose a file.";
        return;
      }

      formError.textContent = "";
      const reader = new FileReader();
      reader.onload = function () {
        addPatientReport(patient.id, {
          id: createReportId(),
          title: reportTitle,
          date: new Date().toISOString().slice(0, 10),
          summary: reportSummary,
          fileName: reportFile.name,
          fileType: reportFile.type,
          fileData: reader.result
        });

        const refreshedPatient = getPatientById(patient.id);
        renderReports(refreshedPatient);
        reportForm.reset();
      };

      reader.onerror = function () {
        formError.textContent = "Unable to read the selected report file.";
      };

      reader.readAsDataURL(reportFile);
    });
  </script>
</body>
</html>
