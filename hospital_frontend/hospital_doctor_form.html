<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Doctor - HealthSphere Hospital</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy:#0f2b63; --blue:#0b4ea2; --sky:#17a2b8; --text:#17233d; --muted:#5d6f8f; --line:#dce6f2; }
    body { min-height:100vh; font-family:Poppins, Arial, sans-serif; background:radial-gradient(circle at top left, rgba(23,162,184,.15), transparent 22%), linear-gradient(180deg, #f7fbff 0%, #edf4fb 100%); color:var(--text); padding:24px; }
    .dashboard { max-width:1320px; margin:0 auto; display:flex; gap:18px; align-items:flex-start; min-height:calc(100vh - 48px); }
    .sidebar-shell { width:138px; flex:0 0 138px; background:linear-gradient(180deg, var(--navy), #14346b 56%, #0c204f); border-radius:26px; box-shadow:0 18px 42px rgba(15,43,99,.18); padding:16px 12px; }
    .sidebar { display:grid; gap:22px; align-content:start; }
    .side-link { min-height:76px; border-radius:18px; padding:10px 8px; background:rgba(255,255,255,.08); color:#eef4ff; text-decoration:none; display:grid; justify-items:center; align-content:center; gap:8px; text-align:center; }
    .side-link.active { background:rgba(255,255,255,.22); border:1px solid rgba(255,255,255,.14); }
    .side-link span { width:40px; height:40px; border-radius:14px; background:rgba(255,255,255,.12); display:grid; place-items:center; font-size:18px; }
    .side-link small { font-size:12px; line-height:1.2; font-weight:700; }
    .content { flex:1; display:grid; gap:22px; }
    .brand-row { display:flex; align-items:center; gap:12px; padding:6px 2px 0; }
    .brand-logo { width:38px; height:38px; border-radius:12px; background:linear-gradient(135deg, #2d75d7, #0f56b9); color:#fff; display:grid; place-items:center; box-shadow:0 12px 26px rgba(11,78,162,.22); }
    .brand-name { font-size:20px; font-weight:800; color:#1a2741; }
    .form-card { background:#fff; border:1px solid var(--line); border-radius:26px; padding:28px; box-shadow:0 14px 30px rgba(23,35,61,.06); }
    .form-head { margin-bottom:24px; }
    .form-head h1 { font-size:clamp(30px, 4vw, 42px); margin-bottom:8px; }
    .form-head p { color:var(--muted); line-height:1.6; }
    form { display:grid; gap:16px; }
    .field-grid { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:16px; }
    .field { display:grid; gap:8px; }
    label { font-size:14px; font-weight:700; }
    .input, textarea { width:100%; border:1px solid var(--line); border-radius:16px; padding:14px 16px; font-size:15px; font-family:inherit; outline:none; }
    .input:focus, textarea:focus { border-color:var(--blue); box-shadow:0 0 0 4px rgba(11,78,162,.12); }
    textarea { resize:vertical; min-height:120px; }
    .actions { display:flex; gap:12px; flex-wrap:wrap; margin-top:10px; }
    .button { border:0; border-radius:16px; padding:14px 18px; font-size:15px; font-weight:700; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; gap:10px; }
    .button-primary { color:#fff; background:linear-gradient(135deg, var(--blue), var(--sky)); box-shadow:0 14px 24px rgba(11,78,162,.2); }
    .button-secondary { color:var(--blue); background:#eef4ff; border:1px solid #cfe0f7; }
    .error { min-height:20px; color:#c53b3b; font-size:13px; }
    @media (max-width:980px) { .dashboard { display:grid; } .sidebar-shell { width:100%; } .sidebar { grid-template-columns:repeat(3, minmax(0, 1fr)); } }
    @media (max-width:720px) { .field-grid { grid-template-columns:1fr; } }
    @media (max-width:640px) { body { padding:12px; } .sidebar { grid-template-columns:repeat(2, minmax(0, 1fr)); } .form-card { padding:20px; } }
  </style>
</head>
<body>
  <main class="dashboard">
    <aside class="sidebar-shell">
      <nav class="sidebar" aria-label="Hospital sections">
        <a class="side-link" href="hospital_home.html"><span><i class="fa-solid fa-house"></i></span><small>Home</small></a>
        <a class="side-link active" href="hospital_doctors.html"><span><i class="fa-solid fa-user-doctor"></i></span><small>Add Doctors</small></a>
        <a class="side-link" href="hospital_bed_availability.html"><span><i class="fa-solid fa-bed"></i></span><small>Bed Availability</small></a>
        <a class="side-link" href="hospital_appointments.html"><span><i class="fa-solid fa-calendar-check"></i></span><small>Appointments</small></a>
        <a class="side-link" href="hospital_patients.html"><span><i class="fa-solid fa-hospital-user"></i></span><small>Patient</small></a>
        <a class="side-link" href="hospital_emergency.html"><span><i class="fa-solid fa-truck-medical"></i></span><small>Emergency</small></a>
      </nav>
    </aside>
    <section class="content">
      <div class="brand-row">
        <div class="brand-logo"><i class="fa-solid fa-heart-pulse"></i></div>
        <div class="brand-name">HealthSphere</div>
      </div>
      <section class="form-card">
        <div class="form-head">
          <h1 id="pageTitle">Add New Doctor</h1>
          <p id="pageSubtitle">Enter the doctor details below. After saving, the doctor card will appear on the doctors page.</p>
        </div>
        <form id="doctorForm" novalidate>
          <div class="field-grid">
            <div class="field"><label for="doctorName">Doctor Name</label><input id="doctorName" class="input" type="text" placeholder="Enter full name" required /></div>
            <div class="field"><label for="doctorSpecialty">Specialty</label><input id="doctorSpecialty" class="input" type="text" placeholder="Enter specialty" required /></div>
            <div class="field"><label for="doctorExperience">Experience</label><input id="doctorExperience" class="input" type="text" placeholder="Example: 10 years" required /></div>
            <div class="field"><label for="doctorAvailability">Availability</label><input id="doctorAvailability" class="input" type="text" placeholder="Example: Mon - Fri, 9 AM - 4 PM" required /></div>
            <div class="field"><label for="doctorEmail">Email</label><input id="doctorEmail" class="input" type="email" placeholder="Enter email address" required /></div>
            <div class="field"><label for="doctorPhone">Phone</label><input id="doctorPhone" class="input" type="text" placeholder="Enter contact number" required /></div>
          </div>
          <div class="field">
            <label for="doctorBio">Doctor Details</label>
            <textarea id="doctorBio" placeholder="Add qualifications, focus areas, or any hospital note." required></textarea>
          </div>
          <p id="formError" class="error" aria-live="polite"></p>
          <div class="actions">
            <button class="button button-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i><span id="submitLabel">Save Doctor</span></button>
            <a class="button button-secondary" href="hospital_doctors.html"><i class="fa-solid fa-arrow-left"></i><span>Back to Doctors</span></a>
          </div>
        </form>
      </section>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../hospital_backend/hospital_doctors.js"></script>
  <script>
    const query = new URLSearchParams(window.location.search);
    const doctorId = query.get("id");
    const existingDoctor = doctorId ? null : null; // will load async
    const pageTitle = document.getElementById("pageTitle");
    const pageSubtitle = document.getElementById("pageSubtitle");
    const submitLabel = document.getElementById("submitLabel");
    const formError = document.getElementById("formError");

    async function loadForm() {
      if (doctorId) {
        try {
          const doctor = await getDoctorById(doctorId);
          if (!doctor) {
            window.location.href = "hospital_doctors.html";
            return;
          }
          pageTitle.textContent = "Edit Doctor Details";
          pageSubtitle.textContent = "Update the doctor information below and save the changes.";
          submitLabel.textContent = "Update Doctor";
          document.getElementById("doctorName").value = doctor.name;
          document.getElementById("doctorSpecialty").value = doctor.specialty;
          document.getElementById("doctorExperience").value = doctor.experience;
          document.getElementById("doctorAvailability").value = doctor.availability;
          document.getElementById("doctorEmail").value = doctor.email;
          document.getElementById("doctorPhone").value = doctor.phone;
          document.getElementById("doctorBio").value = doctor.bio;
        } catch (error) {
          console.error('Error loading doctor:', error);
          window.location.href = "hospital_doctors.html";
        }
      }
    }

    loadForm();

    document.getElementById("doctorForm").addEventListener("submit", async function (event) {
      event.preventDefault();

      const doctor = {
        doc_id: doctorId || generateDoctorId(),
        name: document.getElementById("doctorName").value.trim(),
        specialty: document.getElementById("doctorSpecialty").value.trim(),
        experience: document.getElementById("doctorExperience").value.trim(),
        availability: document.getElementById("doctorAvailability").value.trim(),
        email: document.getElementById("doctorEmail").value.trim(),
        phone: document.getElementById("doctorPhone").value.trim(),
        bio: document.getElementById("doctorBio").value.trim()
      };

      if (Object.values(doctor).some((value) => !value)) {
        formError.textContent = "Please fill in every field before saving.";
        return;
      }

      try {
        await upsertDoctor(doctor);
        window.location.href = "hospital_doctors.html";
      } catch (error) {
        console.error('Error saving doctor:', error);
        formError.textContent = "Error saving doctor. Please try again.";
      }
    });
  </script>
</body>
</html>
